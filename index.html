<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library System</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #74ebd5, #9face6);
}

.container {
    width: 650px;
    margin: 30px auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

.section {
    margin-bottom: 20px;
    padding: 15px;
    border-radius: 12px;
    background: #f9f9f9;
    border-left: 5px solid #6c63ff;
}

.section h3 {
    margin-top: 0;
    color: #444;
}

input {
    width: 97%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
}

input:focus {
    border-color: #6c63ff;
    box-shadow: 0 0 5px rgba(108,99,255,0.4);
}

button {
    width: 100%;
    padding: 11px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #6c63ff, #48c6ef);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
    transform: scale(1.02);
}

#output {
    margin-top: 20px;
    padding: 12px;
    background: #1e1e1e;
    color: #00ff9c;
    border-radius: 10px;
    white-space: pre-line;
    font-family: monospace;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="container">
    <h2>📚 Library Management System</h2>

    <div class="section">
        <h3>➕ Add Book</h3>
        <input id="reg_add" placeholder="Registration Number">
        <input id="id_add" placeholder="Book ID">
        <input id="title_add" placeholder="Title">
        <input id="author_add" placeholder="Author">
        <button onclick="addBook()">Add Book</button>
    </div>

    <div class="section">
        <h3>📤 Issue Book</h3>
        <input id="reg_issue" placeholder="Registration Number">
        <input id="id_issue" placeholder="Book ID">
        <button onclick="issueBook()">Issue Book</button>
    </div>

    <div class="section">
        <h3>🔄 Return Book</h3>
        <input id="reg_return" placeholder="Registration Number">
        <input id="id_return" placeholder="Book ID">
        <button onclick="returnBook()">Return Book</button>
    </div>

    <div class="section">
        <h3>📊 View Data</h3>
        <button onclick="showAll()">Show Available Books</button>
        <button onclick="showCount()">Show Count</button>
    </div>

    <div id="output"></div>
</div>

<script>
var Module = {
    onRuntimeInitialized: function() {}
};

function addBook() {
    let reg = document.getElementById("reg_add").value;
    let id = document.getElementById("id_add").value;
    let title = document.getElementById("title_add").value;
    let author = document.getElementById("author_add").value;

    let r = Module._malloc(reg.length + 1);
    let i = Module._malloc(id.length + 1);
    let t = Module._malloc(title.length + 1);
    let a = Module._malloc(author.length + 1);

    Module.stringToUTF8(reg, r, reg.length + 1);
    Module.stringToUTF8(id, i, id.length + 1);
    Module.stringToUTF8(title, t, title.length + 1);
    Module.stringToUTF8(author, a, author.length + 1);

    Module._addBook(r, i, t, a);

    document.getElementById("output").innerText =
        Module.UTF8ToString(Module._getOutput());

    Module._free(r);
    Module._free(i);
    Module._free(t);
    Module._free(a);
}

function issueBook() {
    let reg = document.getElementById("reg_issue").value;
    let id = document.getElementById("id_issue").value;

    let r = Module._malloc(reg.length + 1);
    let i = Module._malloc(id.length + 1);

    Module.stringToUTF8(reg, r, reg.length + 1);
    Module.stringToUTF8(id, i, id.length + 1);

    Module._issueBook(r, i);

    document.getElementById("output").innerText =
        Module.UTF8ToString(Module._getOutput());

    Module._free(r);
    Module._free(i);
}

function returnBook() {
    let reg = document.getElementById("reg_return").value;
    let id = document.getElementById("id_return").value;

    let r = Module._malloc(reg.length + 1);
    let i = Module._malloc(id.length + 1);

    Module.stringToUTF8(reg, r, reg.length + 1);
    Module.stringToUTF8(id, i, id.length + 1);

    Module._returnBook(r, i);

    document.getElementById("output").innerText =
        Module.UTF8ToString(Module._getOutput());

    Module._free(r);
    Module._free(i);
}

function showAll() {
    document.getElementById("output").innerText =
        Module.UTF8ToString(Module._showAll());
}

function showCount() {
    document.getElementById("output").innerText =
        Module.UTF8ToString(Module._showCount());
}
</script>

<script src="main.js"></script>

</body>
</html>
