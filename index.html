<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Management System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 500px;
    background: #ffffff;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

.form-group {
    display: grid;
    gap: 10px;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
    transition: 0.2s;
}

input:focus {
    border-color: #667eea;
    outline: none;
}

.buttons {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

.output {
    margin-top: 25px;
    background: #0f172a;
    color: #22c55e;
    padding: 15px;
    border-radius: 12px;
    min-height: 140px;
    font-family: monospace;
    white-space: pre-wrap;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">
    <h1>📚 Library Management System</h1>

    <div class="form-group">
        <input id="bookId" placeholder="Book ID">
        <input id="title" placeholder="Title">
        <input id="author" placeholder="Author">
        <input id="regNo" placeholder="Student Reg No">
    </div>

    <div class="buttons">
        <button onclick="addBook()">Add Book</button>
        <button onclick="issueBook()">Issue Book</button>
        <button onclick="returnBook()">Return Book</button>
        <button onclick="searchBook()">Search Book</button>
        <button onclick="showIssued()">Issued Books</button>
        <button onclick="showCount()">Count</button>
    </div>

    <div class="output" id="output"></div>
</div>

<script src="index.js"></script>

<script>
function getInput(id) {
    return document.getElementById(id).value;
}

function addBook() {
    Module.ccall('addBook', null, ['string','string','string'], [
        getInput('bookId'),
        getInput('title'),
        getInput('author')
    ]);
    displayOutput();
}

function issueBook() {
    Module.ccall('issueBook', null, ['string','string'], [
        getInput('bookId'),
        getInput('regNo')
    ]);
    displayOutput();
}

function returnBook() {
    Module.ccall('returnBook', null, ['string'], [
        getInput('bookId')
    ]);
    displayOutput();
}

function searchBook() {
    Module.ccall('searchBook', null, ['string'], [
        getInput('bookId')
    ]);
    displayOutput();
}

function showIssued() {
    Module.ccall('showIssued');
    displayOutput();
}

function showCount() {
    Module.ccall('showCount');
    displayOutput();
}

function displayOutput() {
    setTimeout(() => {
        let text = Module.ccall('getOutput', 'string', [], []);
        document.getElementById('output').innerText = text;
    }, 100);
}
</script>

</body>
</html>
