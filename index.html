<!DOCTYPE html>
<html>
<head>
<title>Library System</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#eef1f6;
}

.sidebar{
width:250px;
background:#111827;
color:white;
padding:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin:6px 0;
border:none;
background:#1f2937;
color:white;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:#4f46e5;
}

.main{
flex:1;
padding:20px;
}

.card{
display:none;
background:white;
padding:20px;
border-radius:10px;
}

.active{
display:block;
}

#output{
background:black;
color:lime;
padding:10px;
margin-top:10px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Library</h2>
<button onclick="show('add')">Add Book</button>
<button onclick="show('issue')">Issue Book</button>
<button onclick="show('return')">Return Book</button>
<button onclick="showAll()">Show All</button>
<button onclick="showCount()">Show Count</button>
</div>

<div class="main">

<div id="output" class="card active">System Ready</div>

<div id="add" class="card">
<h3>Add Book</h3>
<input id="i1" placeholder="Book ID">
<input id="t1" placeholder="Title">
<input id="a1" placeholder="Author">
<button onclick="addBook()">Submit</button>
</div>

<div id="issue" class="card">
<h3>Issue Book</h3>
<input id="r2" placeholder="Reg No">
<input id="i2" placeholder="Book ID">
<button onclick="issueBook()">Submit</button>
</div>

<div id="return" class="card">
<h3>Return Book</h3>
<input id="r3" placeholder="Reg No">
<input id="i3" placeholder="Book ID">
<button onclick="returnBook()">Submit</button>
</div>

</div>

<script src="main.js"></script>

<script>

function hideAll(){
document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
}

function show(id){
hideAll();
document.getElementById(id).classList.add('active');
}

function addBook(){
Module.ccall('addBook',null,
['string','string','string'],
[i1.value,t1.value,a1.value]);
update();
}

function issueBook(){
Module.ccall('issueBook',null,
['string','string'],
[r2.value,i2.value]);
update();
}

function returnBook(){
Module.ccall('returnBook',null,
['string','string'],
[r3.value,i3.value]);
update();
}

function showAll(){
document.getElementById('output').innerText =
Module.ccall('showAll','string');
}

function showCount(){
document.getElementById('output').innerText =
Module.ccall('showCount','string');
}

function update(){
setTimeout(()=>{
document.getElementById('output').innerText =
Module.ccall('getOutput','string');
},100);
}

</script>

</body>
</html>
