<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Management System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #eef1f6;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #111827;
    color: white;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    background: #1f2937;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.sidebar button:hover {
    background: #4f46e5;
}

/* MAIN AREA */
.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

/* CARDS */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    max-width: 500px;
    display: none;
    margin-bottom: 20px;
}

.card.active {
    display: block;
}

input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.action-btn {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.action-btn:hover {
    background: #3730a3;
}

/* OUTPUT PANEL (CLEAN FIX) */
#outputCard {
    display: block;
}

#output {
    margin-top: 10px;
    padding: 12px;
    background: #0f172a;
    color: #22c55e;
    border-radius: 8px;
    min-height: 100px;
    font-family: monospace;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📚 Library</h2>

    <button onclick="show('add')">Add Book</button>
    <button onclick="show('issue')">Issue Book</button>
    <button onclick="show('return')">Return Book</button>
    <button onclick="showAll()">Show All</button>
    <button onclick="showCount()">Show Count</button>
</div>

<!-- MAIN -->
<div class="main">

    <!-- OUTPUT PANEL -->
    <div class="card active" id="outputCard">
        <h3>📊 Output Panel</h3>
        <div id="output">Welcome to Library System</div>
    </div>

    <!-- ADD BOOK -->
    <div id="add" class="card">
        <h3>Add Book</h3>
        <input id="r1" placeholder="Registration No">
        <input id="i1" placeholder="Book ID">
        <input id="t1" placeholder="Title">
        <input id="a1" placeholder="Author">
        <button class="action-btn" onclick="addBook()">Add</button>
    </div>

    <!-- ISSUE BOOK -->
    <div id="issue" class="card">
        <h3>Issue Book</h3>
        <input id="r2" placeholder="Registration No">
        <input id="i2" placeholder="Book ID">
        <button class="action-btn" onclick="issueBook()">Issue</button>
    </div>

    <!-- RETURN BOOK -->
    <div id="return" class="card">
        <h3>Return Book</h3>
        <input id="r3" placeholder="Registration No">
        <input id="i3" placeholder="Book ID">
        <button class="action-btn" onclick="returnBook()">Return</button>
    </div>

</div>

<script src="main.js"></script>

<script>

/* SWITCH CARDS */
function show(id){
    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* ADD */
function addBook(){
    Module.ccall('addBook', null,
        ['string','string','string','string'],
        [r1.value, i1.value, t1.value, a1.value]
    );
    updateOutput();
}

/* ISSUE */
function issueBook(){
    Module.ccall('issueBook', null,
        ['string','string'],
        [r2.value, i2.value]
    );
    updateOutput();
}

/* RETURN */
function returnBook(){
    Module.ccall('returnBook', null,
        ['string','string'],
        [r3.value, i3.value]
    );
    updateOutput();
}

/* SHOW ALL */
function showAll(){
    document.getElementById("output").innerText =
        Module.ccall('showAll','string');
}

/* SHOW COUNT */
function showCount(){
    document.getElementById("output").innerText =
        Module.ccall('showCount','string');
}

/* UPDATE OUTPUT */
function updateOutput(){
    setTimeout(()=>{
        document.getElementById("output").innerText =
            Module.ccall('getOutput','string');
    },100);
}

</script>

</body>
</html>
